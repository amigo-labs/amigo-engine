[window]
title = "Amigo Game"
width = 1280
height = 720
fullscreen = false
vsync = true

[render]
virtual_width = 480
virtual_height = 270
scale_mode = "pixel_perfect"

[audio]
master_volume = 0.8
sfx_volume = 1.0
music_volume = 0.6

[dev]
hot_reload = true
debug_overlay = true
api_server = false
api_port = 9999

[art]
backend = "qwen-image"
art_mode = "pixel"
default_sprite_size = 32
default_style = "caribbean"
default_palette = "standard"
