name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            pkg-config
      - name: Check library crates
        run: |
          cargo check \
            -p amigo_core \
            -p amigo_steering \
            -p amigo_render \
            -p amigo_ui \
            -p amigo_audio \
            -p amigo_input \
            -p amigo_tilemap \
            -p amigo_animation \
            -p amigo_assets \
            -p amigo_net \
            -p amigo_scene \
            -p amigo_editor \
            -p amigo_api \
            -p amigo_debug \
            -p amigo_engine \
            -p amigo_tidal_parser \
            -p amigo_audio_pipeline
      - name: Check tool crates
        run: |
          cargo check \
            -p amigo_cli \
            -p amigo_mcp \
            -p amigo_artgen \
            -p amigo_audiogen

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            pkg-config
      - name: Clippy library crates
        run: |
          cargo clippy \
            -p amigo_core \
            -p amigo_steering \
            -p amigo_render \
            -p amigo_ui \
            -p amigo_audio \
            -p amigo_input \
            -p amigo_tilemap \
            -p amigo_animation \
            -p amigo_assets \
            -p amigo_net \
            -p amigo_scene \
            -p amigo_editor \
            -p amigo_api \
            -p amigo_debug \
            -p amigo_engine \
            -p amigo_tidal_parser \
            -p amigo_audio_pipeline \
            -- -D warnings
      - name: Clippy tool crates
        run: |
          cargo clippy \
            -p amigo_cli \
            -p amigo_mcp \
            -p amigo_artgen \
            -p amigo_audiogen \
            -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            pkg-config
      - name: Run tests
        run: |
          cargo test \
            -p amigo_core \
            -p amigo_tidal_parser \
            -p amigo_audio_pipeline \
            -p amigo_editor \
            -p amigo_assets \
            -p amigo_audio \
            -p amigo_animation \
            -p amigo_net \
            -p amigo_reflect \
            -p amigo_steering \
            -p amigo_tilemap \
            -p amigo_scene
      - name: Doc tests
        run: |
          cargo test --doc \
            -p amigo_tidal_parser \
            -p amigo_audio_pipeline

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            pkg-config
      - name: Build docs
        run: |
          cargo doc --no-deps \
            -p amigo_core \
            -p amigo_render \
            -p amigo_audio \
            -p amigo_input \
            -p amigo_tidal_parser \
            -p amigo_audio_pipeline \
            -p amigo_engine
        env:
          RUSTDOCFLAGS: ""
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: target/doc/

  release-build:
    name: Release Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            pkg-config
      - run: cargo build --release --target ${{ matrix.target }} -p amigo_engine -p amigo_cli
